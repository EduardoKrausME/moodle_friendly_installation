log_format                  main '$remote_addr [$time_local] "$request_method $status $scheme://$host$request_uri" $bytes_sent "$http_referer" "$http_user_agent" $request_time';

access_log                  /var/log/nginx/access.log main;

sendfile                    on;
tcp_nopush                  on;
tcp_nodelay                 on;

keepalive_timeout           6000;
keepalive_requests          10000;
client_header_timeout       2000;
client_body_timeout         2000;
client_max_body_size        10G;
reset_timedout_connection   on;
send_timeout                2000;
types_hash_max_size         4096;

add_header                  X-Me $hostname;

gzip                        on;
gzip_types                  application/vnd.apple.mpegurl;

# common proxy settings
proxy_connect_timeout       1000;
proxy_send_timeout          1500;
proxy_read_timeout          2000;

# common file caching / aio
open_file_cache             max=100 inactive=5m;
open_file_cache_valid       2m;
open_file_cache_min_uses    1;
open_file_cache_errors      on;

proxy_cache_path            /etc/nginx/cache   levels=1:2   keys_zone=krauscache:10m   inactive=24h   use_temp_path=off;
proxy_cache_key             "$scheme$request_method$host$request_uri";

limit_req_zone              $binary_remote_addr zone=perip:10m rate=20r/s;

map $http_user_agent $block_bot {
    default         0;
    ~*(curl|AhrefsBot|bingbot|MixrankBot|Amazonbot|PetalBot|SemrushBot|YandexBot|DuckDuckBot|Applebot|python|UptimeRobot|Facebot|Twitterbot|DotBot|Go-http-client|OpenIndexScanner|ClaudeBot) 1;
}

server {
    # Block any unauthorized requests.
    location ~* /\.git  { return 404; }
    location ~* wp-     { return 404; }
    location ~ \.env    { return 404; }
    location ~* phpinfo { return 404; }
    if ($block_bot)     { return 404; }
}
