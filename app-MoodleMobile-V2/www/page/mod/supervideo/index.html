<ons-page id="page-mod-supervideo">

    <ons-toolbar>
        <div class="left">
            <ons-back-button>
                <span data-i18n-html="course.course"></span>
            </ons-back-button>
        </div>
        <div class="center"></div>
    </ons-toolbar>

    <div class="content">
        <div class="xpull">
            <div class="xpull__start-msg">
                <div class="xpull__arrow"></div>
            </div>
            <div class="xpull__spinner">
                <div class="xpull__spinner-circle"></div>
            </div>
        </div>

        <div id="page-mod-supervideo-content">
            <ons-card>
                <div class="description"></div>
                <div class="intro"></div>
                <div class="data-content">
                    <ons-icon icon="md-spinner" spin></ons-icon>
                </div>
                <div id='map-visualization' style="display:none">
                    <div class='map'></div>
                    <h3 id="your-map-view" class="main-view">
                        <em data-i18n-html="mod.supervideo.viewmap"></em>
                        <span></span>
                    </h3>
                    <div class='click'></div>
                </div>
            </ons-card>

        </div>
    </div>

    <ons-dialog id="supervideo-erro-carregar-arquivo">
        <div style="text-align:center; padding: 10px;">
            <p class="title"></p>
            <p>
                <ons-button onclick="PageOpen.hideDialog()" data-i18n-html="common.ok"></ons-button>
            </p>
        </div>
    </ons-dialog>

    <script>
        $('#page-mod-supervideo .content').xpull({
            'callback': function () {
                ModSupervideo.show_module_load();
            }
        });
    </script>

    <link href="page/mod/supervideo/style.css" rel="stylesheet"/>

</ons-page>
