<ons-page id="page-mod-page">

    <ons-toolbar>
        <div class="left">
            <ons-back-button>
                <span data-i18n-html="course.course"></span>
            </ons-back-button>
        </div>
        <div class="center"></div>
    </ons-toolbar>

    <div class="content">
        <div class="xpull">
            <div class="xpull__start-msg">
                <div class="xpull__arrow"></div>
            </div>
            <div class="xpull__spinner">
                <div class="xpull__spinner-circle"></div>
            </div>
        </div>

        <div id="page-mod-page-content">
            <ons-icon icon="md-spinner" spin></ons-icon>
        </div>
    </div>

    <script>
        $('#page-mod-page .content').xpull({
            'callback': function () {
                ModPage.show_module_load();
            }
        });
    </script>

    <link href="page/mod/page/style.css" rel="stylesheet"/>

</ons-page>
