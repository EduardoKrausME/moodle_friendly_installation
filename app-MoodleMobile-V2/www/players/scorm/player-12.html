<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <title>SCORM Player</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <script src="scorm-again.js"></script>
    <script src="scorm12.js"></script>

    <style>
        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f5f5f5;
        }

        #player-header {
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            background: #fff;
            border-bottom: 1px solid #ddd;
            box-sizing: border-box;
        }

        .player-title {
            font-size: 15px;
            font-weight: 600;
        }

        .player-status {
            font-size: 12px;
            color: #555;
        }

        .player-error {
            padding: 16px;
            color: #a40000;
            background: #fff3f3;
            border-bottom: 1px solid #ffd0d0;
            display: none;
        }

        .player-frame {
            width: 100%;
            height: 100%;
            border: 0;
            display: block;
            background: #fff;
        }
    </style>
</head>
<body>

<div id="player-header">
    <div class="player-title">SCORM</div>
    <div id="status" class="player-status">Inicializando...</div>
</div>

<div id="error" class="player-error"></div>

<iframe
        id="scorm-frame"
        class="player-frame"
        allow="fullscreen; autoplay"
        allowfullscreen>
</iframe>

<script>
    (function () {
        "use strict";

        var params = new URLSearchParams(window.location.search);
        var hashParams = new URLSearchParams((window.location.hash || "").replace(/^#/, ""));
        var scormUrl = params.get("file");
        var commitUrl = params.get("commit"); // opcional: endpoint para salvar no servidor.

        var playerHeader = document.getElementById("player-header");
        var statusEl = document.getElementById("status");
        var errorEl = document.getElementById("error");
        var frameEl = document.getElementById("scorm-frame");

        var playerContext = {
            courseid: params.get("courseid") || "",
            moduleid: params.get("moduleid") || params.get("cmid") || "",
            cmid: params.get("cmid") || params.get("moduleid") || "",
            scormid: params.get("scormid") || "",
            scoid: params.get("scoid") || "",
            attempt: params.get("attempt") || "1",
            launchurl: scormUrl || ""
        };

        function showError(message) {
            errorEl.style.display = "block";
            errorEl.textContent = message;
            statusEl.textContent = "Erro";
            playerHeader.style.display = "flex";
        }

        function sendOfflineMessage(action, payload) {
            if (!window.parent || window.parent === window) {
                return;
            }

            window.parent.postMessage({
                type: "kopere-scorm-offline",
                version: "SCORM_1.2",
                action: action,
                context: playerContext,
                payload: payload || {},
                timecreated: Date.now()
            }, "*");
        }

        function normalizeLogLevel(messageLevel) {
            switch (messageLevel) {
                case "4":
                case 4:
                case "ERROR":
                    return "ERROR";
                case "3":
                case 3:
                case "WARN":
                    return "WARN";
                case "2":
                case 2:
                case "INFO":
                    return "INFO";
                case "1":
                case 1:
                case "DEBUG":
                    return "DEBUG";
                default:
                    return String(messageLevel || "LOG");
            }
        }

        function sendScormLog(messageLevel, logMessage) {
            sendOfflineMessage("log", {
                messageLevel: normalizeLogLevel(messageLevel),
                originalMessageLevel: messageLevel,
                logMessage: String(logMessage || "")
            });
        }

        function consoleLogHandler(messageLevel, logMessage) {
            switch (messageLevel) {
                case "4":
                case 4:
                case "ERROR":
                    console.error(logMessage);
                    break;
                case "3":
                case 3:
                case "WARN":
                    console.warn(logMessage);
                    break;
                case "2":
                case 2:
                case "INFO":
                    console.info(logMessage);
                    break;
                case "1":
                case 1:
                case "DEBUG":
                    if (console.debug) {
                        console.debug(logMessage);
                    } else {
                        console.log(logMessage);
                    }
                    break;
                default:
                    console.log(logMessage);
            }

            sendScormLog(messageLevel, logMessage);
        }

        if (!scormUrl) {
            showError("Informe a URL do SCORM no parâmetro ?file=. Exemplo: player-12.html?file=/scorm/index_lms.html");
            return;
        }

        var launchUrl;

        try {
            launchUrl = new URL(scormUrl, window.location.href).toString();
            playerContext.launchurl = launchUrl;
        } catch (e) {
            showError("URL inválida: " + scormUrl);
            return;
        }

        if (typeof Scorm12API === "undefined") {
            showError("A biblioteca scorm-again não foi carregada.");
            return;
        }

        var storageKey = "scorm12:" + (playerContext.scormid || "0") + ":" + (playerContext.scoid || "0") + ":" + launchUrl;

        function loadPreviousData() {
            try {
                var raw = localStorage.getItem(storageKey);

                if (!raw) {
                    return null;
                }

                return JSON.parse(raw);
            } catch (e) {
                return null;
            }
        }

        function loadUserDataFromHash() {
            try {
                var raw = hashParams.get("userDataFromLms");

                if (!raw) {
                    return null;
                }

                return JSON.parse(raw);
            } catch (e) {
                console.warn("Não foi possível ler os dados SCORM vindos do Moodle.", e);
                return null;
            }
        }

        function loadInitialData(data) {
            if (!data || !Object.keys(data).length) {
                return false;
            }

            try {
                if (data.cmi || data.adl) {
                    window.API.loadFromJSON(data);
                } else {
                    window.API.loadFromFlattenedJSON(data);
                }
                return true;
            } catch (e) {
                console.warn("Não foi possível restaurar os dados SCORM salvos.", e);
                return false;
            }
        }

        function getCurrentData() {
            if (window.API && typeof window.API.getFlattenedCMI === "function") {
                return window.API.getFlattenedCMI();
            }

            return window.API.renderCommitObject(false);
        }

        function saveLocalData() {
            try {
                var data = getCurrentData();
                localStorage.setItem(storageKey, JSON.stringify(data));
                return data;
            } catch (e) {
                console.warn("Não foi possível salvar localmente os dados SCORM.", e);
                return null;
            }
        }

        var settings = {
            autocommit: true,
            autocommitSeconds: 10,
            logLevel: 2,
            mastery_override: true,
            selfReportSessionTime: true,
            autoPopulateCommitMetadata: true,
            courseId: playerContext.courseid,
            scoId: playerContext.scoid,

            onLogMessage: function (messageLevel, logMessage) {
                consoleLogHandler(messageLevel, logMessage);
            },

            requestHandler: function (commitObject) {
                var currentData = saveLocalData();

                sendOfflineMessage("commit", {
                    commitObject: commitObject,
                    currentData: currentData
                });

                console.log("SCORM commit:", commitObject);
                return commitObject;
            }
        };

        if (commitUrl) {
            settings.lmsCommitUrl = commitUrl;
        }

        window.API = new Scorm12API(settings);

        var previousData = loadPreviousData();
        var userDataFromLms = loadUserDataFromHash();

        if (!loadInitialData(previousData) && !loadInitialData(userDataFromLms)) {
            window.API.loadFromFlattenedJSON({
                "cmi.core.student_id": params.get("studentid") || "1",
                "cmi.core.student_name": params.get("studentname") || "Aluno Teste",
                "cmi.core.lesson_status": "incomplete",
                "cmi.core.entry": "ab-initio"
            });
        }

        window.API.on("LMSInitialize", function () {
            statusEl.textContent = "SCORM iniciado";
            playerHeader.style.display = "flex";
            sendOfflineMessage("launch", {});
        });

        window.API.on("LMSSetValue.*", function (element, value) {
            console.log("LMSSetValue:", element, value);
            saveLocalData();
            sendOfflineMessage("setvalue", {
                element: element,
                value: value
            });
        });

        window.API.on("LMSCommit", function () {
            var currentData = saveLocalData();
            statusEl.textContent = "Dados salvos";
            playerHeader.style.display = "none";
            sendOfflineMessage("commit", {
                currentData: currentData
            });
        });

        window.API.on("LMSFinish", function () {
            var currentData = saveLocalData();
            statusEl.textContent = "SCORM finalizado";
            playerHeader.style.display = "none";
            sendOfflineMessage("finish", {
                currentData: currentData
            });
        });

        window.addEventListener("beforeunload", function () {
            try {
                saveLocalData();
                if (window.API && window.API.isInitialized && window.API.isInitialized()) {
                    window.API.LMSCommit("");
                }
            } catch (e) {
                // Ignore unload errors.
            }
        });

        frameEl.src = launchUrl;
        statusEl.textContent = "Carregando SCORM...";
        playerHeader.style.display = "flex";
    })();
</script>

</body>
</html>
