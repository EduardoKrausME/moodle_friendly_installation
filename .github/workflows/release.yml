name: Auto-release via commit message

on:
  push:
    branches: [ master ]

permissions:
  contents: write

jobs:
  auto-release:
    runs-on: ubuntu-latest

    outputs:
      tag: ${{ steps.ver.outputs.version }}

    steps:
      - name: Checkout full history for tags
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from commit message
        id: ver
        shell: bash
        run: |
          set -euo pipefail

          MSG="$(git log -1 --pretty=%B)"
          RE='^V ([0-9]+)\.([0-9]+)\.([0-9]+)$'

          if [[ "$MSG" =~ $RE ]]; then
            VERSION="${BASH_REMATCH[1]}.${BASH_REMATCH[2]}.${BASH_REMATCH[3]}"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "Release version detected: $VERSION"
          else
            echo "version=" >> "$GITHUB_OUTPUT"
            echo "Ignoring: commit message is not exactly 'V N.N.N'."
          fi

      - name: Stop if there is no version
        if: steps.ver.outputs.version == ''
        run: |
          echo "Ignoring: commit is not a release."

      - name: Validate version.php matches commit version
        if: steps.ver.outputs.version != ''
        shell: bash
        run: |
          set -euo pipefail

          COMMIT_VERSION="${{ steps.ver.outputs.version }}"

          FILE_VERSION="$(php -r '
            $file = "public/app/version.php";

            if (!file_exists($file)) {
                fwrite(STDERR, "File not found: {$file}\n");
                exit(1);
            }

            $data = include $file;

            if (!is_array($data) || !isset($data["version"])) {
                fwrite(STDERR, "The file public/app/version.php does not contain a valid version.\n");
                exit(1);
            }

            echo $data["version"];
          ')"

          echo "Commit version: $COMMIT_VERSION"
          echo "File version: $FILE_VERSION"

          if [[ "$FILE_VERSION" != "$COMMIT_VERSION" ]]; then
            echo "::error::Version mismatch. Commit message has '$COMMIT_VERSION', but public/app/version.php has '$FILE_VERSION'."
            exit 1
          fi

          echo "Version validated successfully."

      - name: Create annotated tag
        if: steps.ver.outputs.version != ''
        shell: bash
        run: |
          set -euo pipefail

          VERSION="${{ steps.ver.outputs.version }}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git rev-parse -q --verify "refs/tags/$VERSION" >/dev/null; then
            echo "::error::Tag '$VERSION' already exists."
            exit 1
          fi

          git tag -a "$VERSION" -m "Release $VERSION" "$GITHUB_SHA"
          git push origin "$VERSION"

      - name: Create GitHub Release
        if: steps.ver.outputs.version != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.version }}
          name: ${{ steps.ver.outputs.version }}
          body: |
            Release ${{ steps.ver.outputs.version }} automatically generated by commit:
            ${{ github.event.head_commit.id }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
