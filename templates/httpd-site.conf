<VirtualHost *:8080>
    ServerName {{DOMAIN}}

    DocumentRoot {{WEBROOT}}

    <Directory {{MOODLE_DIR}}>
        Require all denied
    </Directory>

    <Directory {{WEBROOT}}>
        Options FollowSymLinks
        AllowOverride All
        Require all granted
        Order allow,deny
        Allow from all
    </Directory>

    <FilesMatch \.php$>
        SetHandler "proxy:unix:/run/php-fpm/www.sock|fcgi://localhost/"
    </FilesMatch>
</VirtualHost>
